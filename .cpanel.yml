---
deployment:
  tasks:
    - export DEPLOYPATH=/home/rqfjfunr/public_html/weather
    # Optional: Clear old files in /weather first (uncomment if you want a clean deploy each time; be careful!)
    # - /bin/rm -rf $DEPLOYPATH/*
    # Copy the built Vue files (from dist/ in your repo) to the /weather folder
    - /bin/cp -r dist/. $DEPLOYPATH/
    # Cleaner alternative with rsync (recommended if rsync is available on VeeroTech—most cPanel hosts have it)
    # - rsync -av --delete dist/ $DEPLOYPATH/