---
deployment:
  tasks:
    # Set production mode (good practice)
    - export NODE_ENV=production
    
    # Install dependencies — adjust npm path if needed (see notes below)
    - npm install --production
    
    # Build the Vue app (creates /dist folder)
    - npm run build
    
    # Copy the built files to your target folder
    # Use -r for recursive, . to copy contents (not the dist folder itself)
    - /bin/cp -r dist/. /home/rqfjfunr/public_html/weather/
    
    # Optional: Clean up old files first if you want a fresh deploy every time
    # - /bin/rm -rf /home/rqfjfunr/public_html/weather/*
    # Then copy again (but test without rm first!)