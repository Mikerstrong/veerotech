---
deployment:
  tasks:
    - export DEPLOYPATH=/home/rqfjfunr/public_html
    # Optional: Clear old files first (careful—back up public_html if needed!)
    # - /bin/rm -rf $DEPLOYPATH/*
    # - /bin/rm -rf $DEPLOYPATH/.*  # removes hidden files too, if you want a clean slate
    # Copy everything from the repo's dist/ folder to public_html
    - /bin/cp -r dist/. $DEPLOYPATH/
    # Alternative with rsync (better for syncing/deletes; most cPanel hosts have rsync)
    # - rsync -av --delete dist/ $DEPLOYPATH/